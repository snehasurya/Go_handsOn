apiVersion: v1
kind: Service
metadata:
  name: gin-api-service
spec:
  selector:
    app: gin-app
  ports:
    - protocol: TCP
      port: 80       # Port the Service listens on
      targetPort: 8080 # Port your Gin app listens on
  type: LoadBalancer # On Docker Desktop, this makes the API reachable at localhost:80